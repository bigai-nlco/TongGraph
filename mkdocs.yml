site_name: TongGraph
site_description: TongGraph embedded graph compute database.
site_author: BIGAI TongAgents Team
strict: true

theme:
  name: material
  language: en
  icon:
    logo: material/graph-outline
    repo: fontawesome/brands/github
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: amber
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - toc.follow
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate
    - content.tabs.link

nav:
  - Overview:
      - Overview: index.md
      - Core Concepts: core-concepts.md
      - Changelog: changelog.md
  - Quickstart:
      - Quickstart: quickstart/index.md
      - Property Graph Basics: quickstart/property-graph-basics.md
      - GraphRAG Retrieval: quickstart/graphrag-retrieval.md
      - AI Memory Session Graph: quickstart/ai-memory-session-graph.md
      - Local Persistence And Reopen: quickstart/local-persistence-reopen.md
      - Structured Query From Natural Language: quickstart/structured-query-nl.md
      - Probabilistic Inference: quickstart/probabilistic-inference.md
  - API:
      - API: api/index.md
      - Graph: api/graph.md
      - GraphSnapshot: api/graph-snapshot.md
      - Node: api/node.md
      - Edge: api/edge.md
      - Variable: api/variable.md
      - Factor: api/factor.md
      - Evidence: api/evidence.md
      - Trace: api/trace.md
  - Design:
      - Architecture: design/architecture.md
      - Algorithms: design/algorithms.md
      - Query Layer: design/query-layer.md
      - Full-Text Search: design/fulltext-search.md
      - Vector Search: design/vector-search.md
      - Cypher Compatibility: design/cypher-compatibility.md
      - Belief Propagation: design/belief-propagation.md
      - Persistence: design/persistence.md
  - Examples:
      - Examples: examples/index.md
      - Property Graph Basics: examples/property-graph-basics.md
      - Structured Query Layer: examples/structured-query-layer.md
      - Full-Text Search: examples/fulltext-search.md
      - Vector Search: examples/vector-search.md
      - Cypher Compatibility: examples/cypher-compatibility.md
      - Runtime Algorithms And Batch Compute: examples/runtime-algorithms.md
      - Local Probability Transfer: examples/local-probability-transfer.md
      - SQLite Reopen: examples/sqlite-reopen.md
      - Belief Propagation: examples/belief-propagation.md
      - Benchmarks: examples/benchmarks.md

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths:
            - python
          options:
            docstring_style: google
            inherited_members: true
            members_order: source
            merge_init_into_class: true
            separate_signature: true
            show_bases: false
            show_if_no_docstring: false
            show_root_heading: true
            show_source: false
            show_signature_annotations: true

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.blocks.caption
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js
